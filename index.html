<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily mathematics</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>Daily mathematics (Beta)</h1>
    <p>Project is still in the works! Please send any bugs to Johann.</p>
  </header>

  <main>

    <!-- ── Mobile catalogue shortcut ── -->
    <a href="#catalogue" class="catalogue-shortcut">View full curriculum ↓</a>

    <!-- ── Recommended Assignment Scheduler ── -->
    <div class="scheduler-card">
      <div class="scheduler-header">
        <h2>Recommended assignment</h2>
        <div id="current-week-info" class="week-info"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="location-select">Site</label>
          <select id="location-select">
            <!-- Populated by recommender.js -->
          </select>
        </div>
      </div>

      <div class="scheduler-assignments">
        <div id="assignments-container">
          <!-- Populated by scheduler.js -->
        </div>
      </div>

    </div>

    <!-- ── Full Curriculum Catalogue ── -->
    <div class="catalogue-heading" id="catalogue">Full Curriculum</div>
    <div id="app">
      <div class="loading">Loading curriculum data…</div>
    </div>

  </main>

  <script src="js/recommender.js"></script>

  <script>
    const GRADES = [
      { label: 'Grade 1', grade: 1, gradeDir: 'curriculum/Grade 1', file: 'curriculum/data/grade1_curriculum.json' },
      { label: 'Grade 2', grade: 2, gradeDir: 'curriculum/Grade 2', file: 'curriculum/data/grade2_curriculum.json' },
      { label: 'Grade 3', grade: 3, gradeDir: 'curriculum/Grade 3', file: 'curriculum/data/grade3_curriculum.json' },
      { label: 'Grade 4', grade: 4, gradeDir: 'curriculum/Grade 4', file: 'curriculum/data/grade4_curriculum.json' },
      { label: 'Grade 5', grade: 5, gradeDir: 'curriculum/Grade 5', file: 'curriculum/data/grade5_curriculum.json' },
      { label: 'Grade 6', grade: 6, gradeDir: 'curriculum/Grade 6', file: 'curriculum/data/grade6_curriculum.json' },
      { label: 'Grade 7', grade: 7, gradeDir: 'curriculum/Grade 7', file: 'curriculum/data/grade7_curriculum.json' },
      { label: 'Grade 8', grade: 8, gradeDir: 'curriculum/Grade 8', file: 'curriculum/data/grade8_curriculum.json' }
    ];

    async function loadCurriculum(file) {
      const res = await fetch(file);
      if (!res.ok) throw new Error(`Failed to load ${file}`);
      return res.json();
    }

    function padWeek(n) { return String(n).padStart(2, '0'); }

    function assignmentPath(gradeDir, yearFolder, weekNum, assignment) {
      const weekFolder = `Week ${padWeek(weekNum)}`;
      const filename = `${assignment.order} - ${sanitizeFilename(assignment.name)}.pdf`;
      return `${gradeDir}/${yearFolder}/${weekFolder}/${filename}`;
    }

    function buildAssignments(weeks, gradeDir, yearFolder, isSummer, grade) {
      const wrapper = document.createElement('div');
      const type = isSummer ? 'summer' : 'academic';
      weeks.forEach(w => {
        const card = document.createElement('div');
        card.className = 'week-card';
        card.id = `catalogue-grade-${grade}-${type}-week-${w.week}`;

        const label = document.createElement('div');
        label.className = 'week-label';
        label.innerHTML = `Week ${w.week} - Grade ${grade} - ${w.topic}`;
        card.appendChild(label);

        const list = document.createElement('div');
        list.className = 'assignments-list';

        w.assignments.forEach(a => {
          const item = document.createElement('div');
          item.className = 'assignment-item';

          const num = document.createElement('div');
          num.className = `assignment-num${isSummer ? ' summer' : ''}`;
          num.textContent = a.order;

          const link = document.createElement('a');
          link.className = 'assignment-link';
          link.href = assignmentPath(gradeDir, yearFolder, w.week, a);
          link.textContent = a.name;
          link.target = '_blank';

          item.appendChild(num);
          item.appendChild(link);
          list.appendChild(item);
        });

        card.appendChild(list);
        wrapper.appendChild(card);
      });
      return wrapper;
    }

    function buildGradePanel(grade, gradeDir, data) {
      const panel = document.createElement('div');
      panel.className = 'grade-panel';
      panel.id = `catalogue-grade-${grade}`;

      const backLink = () => {
        const a = document.createElement('a');
        a.href = '#catalogue';
        a.className = 'back-to-top';
        a.textContent = '↑ Back to top';
        return a;
      };

      const makeJumpLink = (grade, type) => {
        const a = document.createElement('a');
        a.id = `jump-current-week-${grade}-${type}`;
        a.className = 'jump-current-week';
        a.textContent = 'Jump to current week \u2192';
        a.style.display = 'none';
        a.addEventListener('click', e => {
          e.preventDefault();
          const weekNum = parseInt(a.dataset.week, 10);
          if (weekNum) jumpToCatalogueWeek(grade, type === 'summer', weekNum);
        });
        return a;
      };

      if (data.academic_year) {
        const pp = document.createElement('div');
        pp.className = 'program-panel academic';
        pp.appendChild(makeJumpLink(grade, 'academic'));
        pp.appendChild(buildAssignments(data.academic_year.weeks, gradeDir, 'Academic Year', false, grade));
        pp.appendChild(backLink());
        panel.appendChild(pp);
      }
      if (data.summer_program) {
        const pp = document.createElement('div');
        pp.className = 'program-panel summer';
        pp.appendChild(makeJumpLink(grade, 'summer'));
        pp.appendChild(buildAssignments(data.summer_program.weeks, gradeDir, 'Summer Program', true, grade));
        pp.appendChild(backLink());
        panel.appendChild(pp);
      }

      return panel;
    }

    function selectGrade(grade) {
      document.querySelectorAll('.grade-tab').forEach(t =>
        t.classList.toggle('active', Number(t.dataset.grade) === grade)
      );
      document.querySelectorAll('.grade-panel').forEach(p =>
        p.classList.toggle('active', p.id === `catalogue-grade-${grade}`)
      );
    }

    function selectProgram(type) {
      document.querySelectorAll('.program-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.program === type)
      );
      document.querySelectorAll('.program-panel').forEach(p =>
        p.classList.toggle('active', p.classList.contains(type))
      );
    }

    function jumpToCatalogueWeek(grade, isSummer, weekNum) {
      const type = isSummer ? 'summer' : 'academic';
      selectGrade(grade);
      selectProgram(type);
      const weekEl = document.getElementById(`catalogue-grade-${grade}-${type}-week-${weekNum}`);
      if (weekEl) weekEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    async function init() {
      const app = document.getElementById('app');
      app.innerHTML = '';

      const [results, calData] = await Promise.all([
        Promise.allSettled(GRADES.map(g => loadCurriculum(g.file).then(data => ({ ...g, data })))),
        fetch('data/school_calendar.json').then(r => r.json()).catch(() => null)
      ]);

      if (results.every(r => r.status === 'rejected')) {
        app.innerHTML = `<div class="error">Could not load any curriculum files. Ensure the JSON files exist at the correct paths relative to index.html.</div>`;
        return;
      }

      const todayStr = new Date().toISOString().split('T')[0];
      let defaultProgram = 'academic';
      if (calData) {
        for (const district of Object.values(calData.districts)) {
          if (district.summer_program &&
              todayStr >= district.summer_program.start &&
              todayStr <= district.summer_program.end) {
            defaultProgram = 'summer';
            break;
          }
        }
      }

      const gradeTabBar = document.createElement('div');
      gradeTabBar.className = 'grade-tabs';
      app.appendChild(gradeTabBar);

      const programTabBar = document.createElement('div');
      programTabBar.className = 'program-tabs';
      [['academic', 'Academic Year'], ['summer', 'Summer Program']].forEach(([type, label]) => {
        const tab = document.createElement('button');
        tab.className = `program-tab ${type}`;
        tab.textContent = label;
        tab.dataset.program = type;
        tab.addEventListener('click', () => selectProgram(type));
        programTabBar.appendChild(tab);
      });
      app.appendChild(programTabBar);

      let firstPanel = true;
      results.forEach(result => {
        if (result.status !== 'fulfilled') return;
        const { label, grade, gradeDir, data } = result.value;

        const tab = document.createElement('button');
        tab.className = 'grade-tab';
        tab.textContent = label;
        tab.dataset.grade = grade;
        tab.addEventListener('click', () => selectGrade(grade));
        gradeTabBar.appendChild(tab);

        const panel = buildGradePanel(grade, gradeDir, data);
        app.appendChild(panel);

        if (firstPanel) {
          tab.classList.add('active');
          panel.classList.add('active');
          firstPanel = false;
        }
      });

      selectProgram(defaultProgram);
    }

    init();
  </script>
</body>
</html>
