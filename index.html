<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mathemathics Curriculum</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>Mathematics worksheets</h1>
    <p>For the academic year and summer program</p>
  </header>

  <main>

    <!-- ── Recommended Assignment Scheduler ── -->
    <div class="scheduler-card">
      <h2>Recommended Assignment</h2>

      <div class="form-row">
        <div class="form-group">
          <label for="location-select">Site</label>
          <select id="location-select">
            <!-- Populated by recommender.js -->
          </select>
        </div>
      </div>

      <div id="current-week-info" class="week-info">
        <!-- Populated by scheduler.js -->
      </div>

      <div class="scheduler-assignments">
        <h4>Today's assignment</h4>
        <div id="assignments-container">
          <!-- Populated by scheduler.js -->
        </div>
      </div>

    </div>

    <!-- ── Full Curriculum Catalogue ── -->
    <div class="catalogue-heading">Full Curriculum</div>
    <div id="app">
      <div class="loading">Loading curriculum data…</div>
    </div>

  </main>

  <script src="js/recommender.js"></script>

  <script>
    const GRADES = [
      { label: 'Grade 1', grade: 1, gradeDir: 'curriculum/Grade 1', file: 'curriculum/data/grade1_curriculum.json' },
      { label: 'Grade 2', grade: 2, gradeDir: 'curriculum/Grade 2', file: 'curriculum/data/grade2_curriculum.json' },
      { label: 'Grade 3', grade: 3, gradeDir: 'curriculum/Grade 3', file: 'curriculum/data/grade3_curriculum.json' },
      { label: 'Grade 4', grade: 4, gradeDir: 'curriculum/Grade 4', file: 'curriculum/data/grade4_curriculum.json' },
      { label: 'Grade 5', grade: 5, gradeDir: 'curriculum/Grade 5', file: 'curriculum/data/grade5_curriculum.json' },
      { label: 'Grade 6', grade: 6, gradeDir: 'curriculum/Grade 6', file: 'curriculum/data/grade6_curriculum.json' },
      { label: 'Grade 7', grade: 7, gradeDir: 'curriculum/Grade 7', file: 'curriculum/data/grade7_curriculum.json' },
      { label: 'Grade 8', grade: 8, gradeDir: 'curriculum/Grade 8', file: 'curriculum/data/grade8_curriculum.json' }
    ];

    async function loadCurriculum(file) {
      const res = await fetch(file);
      if (!res.ok) throw new Error(`Failed to load ${file}`);
      return res.json();
    }

    function toggle(el, btnEl) {
      const open = el.classList.toggle('open');
      if (btnEl) btnEl.classList.toggle('open', open);
    }

    function padWeek(n) { return String(n).padStart(2, '0'); }

    function assignmentPath(gradeDir, yearFolder, weekNum, assignment) {
      const weekFolder = `Week ${padWeek(weekNum)}`;
      const filename = `${assignment.order} - ${sanitizeFilename(assignment.name)}.pdf`;
      return `${gradeDir}/${yearFolder}/${weekFolder}/${filename}`;
    }

    function buildAssignments(weeks, gradeDir, yearFolder, isSummer, grade) {
      const wrapper = document.createElement('div');
      const type = isSummer ? 'summer' : 'academic';
      weeks.forEach(w => {
        const card = document.createElement('div');
        card.className = 'week-card';
        card.id = `catalogue-grade-${grade}-${type}-week-${w.week}`;

        const label = document.createElement('div');
        label.className = 'week-label';
        label.innerHTML = `Week ${w.week} - Grade ${grade} - ${w.topic}`;
        card.appendChild(label);

        const list = document.createElement('div');
        list.className = 'assignments-list';

        w.assignments.forEach(a => {
          const item = document.createElement('div');
          item.className = 'assignment-item';

          const num = document.createElement('div');
          num.className = `assignment-num${isSummer ? ' summer' : ''}`;
          num.textContent = a.order;

          const link = document.createElement('a');
          link.className = 'assignment-link';
          link.href = assignmentPath(gradeDir, yearFolder, w.week, a);
          link.textContent = a.name;
          link.target = '_blank';

          item.appendChild(num);
          item.appendChild(link);
          list.appendChild(item);
        });

        card.appendChild(list);
        wrapper.appendChild(card);
      });
      return wrapper;
    }

    function buildYearSection(label, type, weeks, gradeDir, yearFolder, grade) {
      const section = document.createElement('div');
      section.className = 'year-section';

      const btn = document.createElement('button');
      btn.className = `year-btn ${type}`;
      btn.id = `catalogue-grade-${grade}-${type}-btn`;
      btn.innerHTML = `<span>${label} <span style="font-weight:400;opacity:.85">(${weeks.length} weeks)</span></span><span class="chevron">&#9660;</span>`;

      const content = document.createElement('div');
      content.className = 'year-content';
      content.id = `catalogue-grade-${grade}-${type}`;
      content.appendChild(buildAssignments(weeks, gradeDir, yearFolder, type === 'summer', grade));

      btn.addEventListener('click', () => toggle(content, btn));
      section.appendChild(btn);
      section.appendChild(content);
      return section;
    }

    function buildGradeSection(label, grade, gradeDir, data) {
      const section = document.createElement('div');
      section.className = 'grade-section';

      const btn = document.createElement('button');
      btn.className = 'grade-btn';
      btn.id = `catalogue-grade-${grade}-btn`;
      btn.innerHTML = `<span>${label}</span><span class="chevron">&#9660;</span>`;

      const content = document.createElement('div');
      content.className = 'grade-content';
      content.id = `catalogue-grade-${grade}`;

      if (data.academic_year) {
        content.appendChild(buildYearSection('Academic Year', 'academic', data.academic_year.weeks, gradeDir, 'Academic Year', grade));
      }
      if (data.summer_program) {
        content.appendChild(buildYearSection('Summer Program', 'summer', data.summer_program.weeks, gradeDir, 'Summer Program', grade));
      }

      btn.addEventListener('click', () => toggle(content, btn));
      section.appendChild(btn);
      section.appendChild(content);
      return section;
    }

    function jumpToCatalogueWeek(grade, isSummer, weekNum) {
      const type = isSummer ? 'summer' : 'academic';

      const gradeBtn = document.getElementById(`catalogue-grade-${grade}-btn`);
      const gradeContent = document.getElementById(`catalogue-grade-${grade}`);
      if (gradeContent && !gradeContent.classList.contains('open')) {
        gradeContent.classList.add('open');
        if (gradeBtn) gradeBtn.classList.add('open');
      }

      const yearBtn = document.getElementById(`catalogue-grade-${grade}-${type}-btn`);
      const yearContent = document.getElementById(`catalogue-grade-${grade}-${type}`);
      if (yearContent && !yearContent.classList.contains('open')) {
        yearContent.classList.add('open');
        if (yearBtn) yearBtn.classList.add('open');
      }

      const weekEl = document.getElementById(`catalogue-grade-${grade}-${type}-week-${weekNum}`);
      if (weekEl) weekEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    async function init() {
      const app = document.getElementById('app');
      app.innerHTML = '';

      const results = await Promise.allSettled(
        GRADES.map(g => loadCurriculum(g.file).then(data => ({ ...g, data })))
      );

      if (results.every(r => r.status === 'rejected')) {
        app.innerHTML = `<div class="error">Could not load any curriculum files. Ensure the JSON files exist at the correct paths relative to index.html.</div>`;
        return;
      }

      results.forEach(result => {
        if (result.status === 'fulfilled') {
          const { label, grade, gradeDir, data } = result.value;
          app.appendChild(buildGradeSection(label, grade, gradeDir, data));
        }
      });
    }

    init();
  </script>
</body>
</html>
